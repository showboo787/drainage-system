<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水溝高程計算 V6.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input { border: 1px solid #94a3b8 !important; border-radius: 4px !important; padding: 8px !important; width: 100%; font-size: 16px; }
        .fs-value { color: #dc2626; font-weight: bold; }
        /* 斑馬紋表格 */
        #result_body tr:nth-child(even) { background-color: #f8fafc; }
        #result_body tr:nth-child(odd) { background-color: #ffffff; }
        /* 懸停/點選效果 */
        #result_body tr:hover { background-color: #f1f5f9 !important; border-left: 4px solid #3b82f6; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-4 font-sans">
    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-2xl p-4 md:p-6 border border-slate-200">
        <h1 class="text-xl md:text-2xl font-black text-center text-slate-800 mb-6 border-b pb-4 tracking-tighter">水溝高程計算系統 V6.1</h1>

        <!-- 第一區：設定 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 shadow-sm">
                <h2 class="text-indigo-800 font-bold mb-3 text-xs uppercase tracking-widest flex items-center">
                    <span class="w-2 h-4 bg-indigo-500 mr-2 rounded"></span>水準儀設定 (M)
                </h2>
                <div class="grid grid-cols-2 gap-3">
                    <div><span class="text-[10px] text-indigo-400 font-bold ml-1">基準點 BM</span><input type="number" id="bm" step="0.001" placeholder="10.00"></div>
                    <div><span class="text-[10px] text-indigo-400 font-bold ml-1">後視讀數 BS</span><input type="number" id="bs" step="0.001" placeholder="1.25"></div>
                </div>
                <div class="mt-3 text-center border-t border-indigo-200 pt-2 font-black">
                    <span class="text-slate-500">儀器高 HI:</span> <span id="hi_display" class="text-indigo-600 text-xl tracking-wider">--</span>
                </div>
            </div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 class="text-slate-800 font-bold mb-3 text-xs uppercase tracking-widest flex items-center">
                    <span class="w-2 h-4 bg-slate-500 mr-2 rounded"></span>工程樁號與長度
                </h2>
                <div class="grid grid-cols-3 gap-2">
                    <div><span class="text-[10px] text-slate-400 font-bold">起始樁號</span><input type="number" id="start_st" step="0.01" value="0"></div>
                    <div><span class="text-[10px] text-slate-400 font-bold">總長 (L)</span><input type="number" id="total_len" step="0.01"></div>
                    <div><span class="text-[10px] text-slate-400 font-bold">測點間隔</span><input type="number" id="step_val" value="2.5"></div>
                </div>
            </div>
        </div>

        <!-- 第二區：集水井數據 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="border-l-8 border-emerald-500 bg-emerald-50/30 p-4 rounded-xl shadow-sm">
                <div class="flex items-center mb-3 space-x-2">
                    <span class="text-emerald-700 font-black whitespace-nowrap">集水井:</span>
                    <input type="text" id="name_a" value="A" class="!w-24 !bg-white !font-bold text-emerald-800 border-emerald-200 shadow-sm">
                    <span id="a_st_label" class="text-[10px] text-slate-400 font-mono">Sta. --</span>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center text-sm"><span class="w-24 text-slate-600 font-semibold">蓋面高程:</span><input type="number" id="a_cover" step="0.001"></div>
                    <div class="flex items-center text-sm"><span class="w-24 text-slate-600 font-semibold">溝底高程:</span><input type="number" id="a_bottom" step="0.001"></div>
                    <div class="flex items-center text-sm font-bold text-blue-700"><span class="w-24">井底高程:</span><input type="number" id="a_sump" step="0.001"></div>
                </div>
            </div>
            <div class="border-l-8 border-orange-500 bg-orange-50/30 p-4 rounded-xl shadow-sm">
                <div class="flex items-center mb-3 space-x-2">
                    <span class="text-orange-700 font-black whitespace-nowrap">集水井:</span>
                    <input type="text" id="name_b" value="B" class="!w-24 !bg-white !font-bold text-orange-800 border-orange-200 shadow-sm">
                    <span id="b_st_label" class="text-[10px] text-slate-400 font-mono">Sta. --</span>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center text-sm"><span class="w-24 text-slate-600 font-semibold">蓋面高程:</span><input type="number" id="b_cover" step="0.001"></div>
                    <div class="flex items-center text-sm"><span class="w-24 text-slate-600 font-semibold">溝底高程:</span><input type="number" id="b_bottom" step="0.001"></div>
                    <div class="flex items-center text-sm font-bold text-blue-700"><span class="w-24">井底高程:</span><input type="number" id="b_sump" step="0.001"></div>
                </div>
            </div>
        </div>

        <button onclick="calculateV61()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-black transition-all active:scale-95 text-lg no-print">
            執行高程計算與出圖
        </button>

        <!-- 結果區 -->
        <div id="result_area" class="mt-10" style="display:none;">
            <div class="flex justify-between items-center mb-4 border-l-4 border-indigo-600 pl-3">
                <h2 class="text-lg font-bold text-slate-800 tracking-tight">1. 高程計算表格 (單位: M)</h2>
                <span class="text-[10px] text-slate-400 font-bold bg-slate-100 px-2 py-1 rounded">註: 紅色數值為水準儀讀數 FS</span>
            </div>
            
            <div class="overflow-hidden shadow-lg border rounded-xl mb-10">
                <table class="w-full text-center text-xs md:text-sm bg-white border-collapse">
                    <thead class="bg-slate-800 text-white font-bold border-b-2 border-slate-900">
                        <tr>
                            <th class="p-3 border-r border-slate-700 w-24">樁號 (Sta.)</th>
                            <th class="p-3 border-r border-slate-700">蓋面</th>
                            <th class="p-3 border-r border-slate-700 bg-slate-700">牆頂(-0.15)</th>
                            <th class="p-3 border-r border-slate-700 bg-emerald-800">溝底</th>
                            <th class="p-3 bg-amber-700">挖掘(-0.15)</th>
                        </tr>
                    </thead>
                    <tbody id="result_body" class="text-slate-700 font-medium"></tbody>
                </table>
            </div>

            <h2 class="text-lg font-bold mb-4 border-l-4 border-indigo-600 pl-3 tracking-tight">2. 水溝縱斷面示意圖</h2>
            <div class="bg-white p-4 border rounded-2xl shadow-inner mb-6 overflow-x-auto">
                <div id="svg_container" class="min-w-[620px] flex justify-center py-4 bg-white"></div>
            </div>
            
            <p class="text-center text-[10px] text-slate-400 mb-6 tracking-widest italic font-bold">深度標記 = 牆頂至溝底之垂直高度</p>
            <button onclick="window.print()" class="w-full bg-slate-600 text-white py-4 rounded-xl font-black no-print hover:bg-slate-700 shadow-lg transition">列印 或 存成 PDF 存檔</button>
        </div>
    </div>

    <script>
        function calculateV61() {
            var bm = parseFloat(document.getElementById('bm').value) || 0;
            var bs = parseFloat(document.getElementById('bs').value) || 0;
            var hi = bm + bs;
            var startSt = parseFloat(document.getElementById('start_st').value) || 0;
            var L = parseFloat(document.getElementById('total_len').value) || 0;
            var step = parseFloat(document.getElementById('step_val').value) || 2.5;

            // 取得自定義名稱
            var nameA = document.getElementById('name_a').value || "A";
            var nameB = document.getElementById('name_b').value || "B";

            if (L <= 0) { alert("請輸入總長度"); return; }
            document.getElementById('hi_display').innerText = hi.toFixed(3);
            document.getElementById('a_st_label').innerText = "Sta. " + startSt.toFixed(2);
            document.getElementById('b_st_label').innerText = "Sta. " + (startSt + L).toFixed(2);

            var a_c = parseFloat(document.getElementById('a_cover').value) || 0;
            var a_b = parseFloat(document.getElementById('a_bottom').value) || 0;
            var a_s = parseFloat(document.getElementById('a_sump').value) || 0;
            var b_c = parseFloat(document.getElementById('b_cover').value) || 0;
            var b_b = parseFloat(document.getElementById('b_bottom').value) || 0;
            var b_s = parseFloat(document.getElementById('b_sump').value) || 0;

            var tbody = document.getElementById('result_body');
            tbody.innerHTML = "";

            var pts = [];
            for (var d = 0; d <= L; d += step) pts.push(d);
            if (pts[pts.length-1] !== L) pts.push(L);

            for (var i = 0; i < pts.length; i++) {
                var d = pts[i];
                var curSt = (startSt + d).toFixed(2);
                var cov = a_c + ((b_c - a_c) / L) * d;
                var bot = a_b + ((b_b - a_b) / L) * d;
                var wal = cov - 0.15;
                var dig = bot - 0.15;
                
                // 起點井底數據
                if (d === 0) appendWellRow(tbody, curSt, "集水井 " + nameA + " 井底", a_s, hi);
                
                var tr = document.createElement('tr');
                if (d === 0 || d === L) tr.style.fontWeight = "bold";
                
                // 樁號標註增加集水井名稱
                var label = (d === 0) ? " (" + nameA + ")" : (d === L ? " (" + nameB + ")" : "");

                tr.innerHTML = '<td class="p-3 border-r font-mono bg-slate-50 text-slate-800 tracking-tighter">'+curSt+label+'</td>' +
                    '<td class="p-3 border-r">'+cov.toFixed(2)+'<br><span class="fs-value">'+(hi-cov).toFixed(2)+'</span></td>' +
                    '<td class="p-3 border-r">'+wal.toFixed(2)+'<br><span class="fs-value">'+(hi-wal).toFixed(2)+'</span></td>' +
                    '<td class="p-3 border-r">'+bot.toFixed(2)+'<br><span class="fs-value">'+(hi-bot).toFixed(2)+'</span></td>' +
                    '<td class="p-3 bg-amber-50/50">'+dig.toFixed(2)+'<br><span class="fs-value">'+(hi-dig).toFixed(2)+'</span></td>';
                tbody.appendChild(tr);

                // 終點井底數據
                if (d === L) appendWellRow(tbody, curSt, "集水井 " + nameB + " 井底", b_s, hi);
            }

            drawProfileV61(startSt, startSt+L, a_c, a_b, a_s, b_c, b_b, b_s, nameA, nameB);
            document.getElementById('result_area').style.display = "block";
        }

        function appendWellRow(t, st, n, e, hi) {
            var tr = document.createElement('tr');
            tr.className = "bg-indigo-100 font-bold text-indigo-800 border-y-2 border-indigo-200";
            tr.innerHTML = '<td class="p-2 border-r font-mono tracking-tighter">'+st+'</td><td class="p-2 border-r" colspan="3">'+n+': '+e.toFixed(2)+'</td><td class="p-2">FS: <span class="fs-value">'+(hi-e).toFixed(2)+'</span></td>';
            t.appendChild(tr);
        }

        function drawProfileV61(stA, stB, ac, ab, as, bc, bb, bs, nA, nB) {
            var aw = ac - 0.15; var bw = bc - 0.15;
            var dpxA = aw - ab; var dpxB = bw - bb;
            
            var svg = '<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" style="background:#fff">' +
                '<!-- 下方樁號標尺 -->' +
                '<line x1="80" y1="260" x2="520" y2="260" stroke="#cbd5e1" stroke-width="2" />' +
                '<text x="80" y="285" font-size="12" fill="#64748b" font-weight="bold">集水井 '+nA+' (Sta. '+stA.toFixed(2)+')</text>' +
                '<text x="400" y="285" font-size="12" fill="#64748b" font-weight="bold">集水井 '+nB+' (Sta. '+stB.toFixed(2)+')</text>' +

                '<!-- 集水井 A 示意 -->' +
                '<rect x="80" y="50" width="50" height="200" fill="#f8fafc" stroke="#94a3b8" />' +
                '<line x1="80" y1="50" x2="130" y2="50" stroke="#1e293b" stroke-width="4" />' +
                '<text x="10" y="55" font-size="11" font-weight="bold">蓋:'+ac.toFixed(2)+'</text>' +
                '<text x="10" y="75" font-size="11" fill="#4f46e5">牆:'+aw.toFixed(2)+'</text>' +
                '<text x="10" y="220" font-size="11" fill="#059669">底:'+ab.toFixed(2)+'</text>' +
                '<text x="10" y="250" font-size="11" fill="#2563eb" font-weight="bold">井底:'+as.toFixed(2)+'</text>' +

                '<!-- 集水井 B 示意 -->' +
                '<rect x="470" y="70" width="50" height="180" fill="#f8fafc" stroke="#94a3b8" />' +
                '<line x1="470" y1="70" x2="520" y2="70" stroke="#1e293b" stroke-width="4" />' +
                '<text x="525" y="75" font-size="11" font-weight="bold">蓋:'+bc.toFixed(2)+'</text>' +
                '<text x="525" y="95" font-size="11" fill="#4f46e5">牆:'+bw.toFixed(2)+'</text>' +
                '<text x="525" y="220" font-size="11" fill="#059669">底:'+bb.toFixed(2)+'</text>' +
                '<text x="525" y="250" font-size="11" fill="#2563eb" font-weight="bold">井底:'+bs.toFixed(2)+'</text>' +

                '<!-- 溝體連線 -->' +
                '<path d="M130 50 L470 70" stroke="#94a3b8" stroke-width="1" fill="none" />' + 
                '<path d="M130 65 L470 85" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4" fill="none" />' + 
                '<path d="M130 215 L470 215" stroke="#10b981" stroke-width="3" fill="none" />' + 
                
                '<!-- 深度標記 A -->' +
                '<line x1="140" y1="65" x2="140" y2="215" stroke="#f43f5e" stroke-width="1" />' +
                '<text x="145" y="140" font-size="14" font-weight="bold" fill="#f43f5e">深度: '+dpxA.toFixed(2)+'m</text>' +

                '<!-- 深度標記 B -->' +
                '<line x1="460" y1="85" x2="460" y2="215" stroke="#f43f5e" stroke-width="1" />' +
                '<text x="380" y="150" font-size="14" font-weight="bold" fill="#f43f5e">深度: '+dpxB.toFixed(2)+'m</text>' +

                '</svg>';
            document.getElementById('svg_container').innerHTML = svg;
        }
    </script>
</body>
</html>
