<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水溝高程計算 V8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input { border: 1px solid #94a3b8 !important; border-radius: 4px !important; padding: 8px !important; width: 100%; font-size: 16px; }
        .fs-value { color: #dc2626; font-weight: bold; font-size: 0.85rem; }
        .rel-value { color: #2563eb; font-weight: normal; font-size: 0.8rem; margin-left: 2px; }
        #result_body tr:nth-child(even) { background-color: #f8fafc; }
        #result_body tr:nth-child(odd) { background-color: #ffffff; }
        #result_body tr:hover { background-color: #f1f5f9 !important; border-left: 4px solid #3b82f6; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-4 font-sans text-slate-900">
    <div class="max-w-5xl mx-auto bg-white shadow-2xl rounded-2xl p-4 md:p-6 border border-slate-200">
        <h1 class="text-xl md:text-2xl font-black text-center text-slate-800 mb-6 border-b pb-4 tracking-tighter">水溝高程計算系統 V8.0</h1>

        <!-- 第一區：水準儀設定 (連動功能) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 shadow-sm md:col-span-2">
                <h2 class="text-indigo-800 font-bold mb-2 text-xs uppercase tracking-widest flex items-center">
                    <span class="w-2 h-4 bg-indigo-500 mr-2 rounded"></span>水準儀設定 (高程或公分擇一輸入)
                </h2>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <span class="text-[10px] text-indigo-400 font-bold ml-1">基準高程 BM (M)</span>
                        <input type="number" id="bm_m" step="0.001" placeholder="18.77" oninput="syncBM('m')">
                    </div>
                    <div class="flex items-end pb-2 justify-center text-indigo-300 font-bold">或</div>
                    <div>
                        <span class="text-[10px] text-indigo-400 font-bold ml-1">相對高度 (cm)</span>
                        <input type="number" id="bm_cm" step="0.1" placeholder="177.0" oninput="syncBM('cm')">
                    </div>
                </div>
                <div class="grid grid-cols-1 mt-3">
                    <div>
                        <span class="text-[10px] text-indigo-400 font-bold ml-1">後視讀數 BS (M)</span>
                        <input type="number" id="bs" step="0.001" placeholder="1.25" oninput="updateHI()">
                    </div>
                </div>
                <div class="mt-2 text-center border-t border-indigo-200 pt-1 font-black">
                    <span class="text-slate-500 text-xs text-center">計算後儀器高 HI:</span> <span id="hi_display" class="text-indigo-600 text-lg">--</span>
                </div>
            </div>

            <!-- 右側基準設定 -->
            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100 shadow-sm flex flex-col justify-between">
                <div>
                    <h2 class="text-amber-800 font-bold mb-2 text-xs uppercase tracking-widest flex items-center">
                        <span class="w-2 h-4 bg-amber-500 mr-2 rounded"></span>換算基準設定
                    </h2>
                    <span class="text-[10px] text-amber-600 font-bold tracking-tighter">設定基準高度 (M) = +0</span>
                    <input type="number" id="ref_base" step="0.01" value="17.00" class="!bg-white border-amber-300" oninput="syncBM('m')">
                </div>
                <div class="text-[10px] text-amber-500 mt-2 italic">
                    ※ 樁號長度設定
                </div>
                <div class="grid grid-cols-2 gap-1 mt-1">
                    <input type="number" id="start_st" step="0.01" value="0" title="起始樁號">
                    <input type="number" id="step_val" value="2.5" title="間隔">
                </div>
            </div>
        </div>

        <!-- 第二區：長度與井數據 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
             <div class="md:col-span-1 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <span class="text-slate-500 font-bold text-xs uppercase">水溝總長 (L)</span>
                <input type="number" id="total_len" step="0.01" placeholder="輸入總長度">
             </div>
             <div class="md:col-span-1 border-l-8 border-emerald-500 bg-emerald-50/30 p-4 rounded-xl">
                <div class="flex items-center mb-2 space-x-2">
                    <span class="text-emerald-700 font-black text-sm">集水井:</span>
                    <input type="text" id="name_a" value="A" class="!w-20 !bg-white">
                </div>
                <div class="space-y-2">
                    <input type="number" id="a_cover" step="0.001" placeholder="A 蓋面">
                    <input type="number" id="a_bottom" step="0.001" placeholder="A 溝底">
                    <input type="number" id="a_sump" step="0.001" placeholder="A 井底">
                </div>
            </div>
            <div class="md:col-span-1 border-l-8 border-orange-500 bg-orange-50/30 p-4 rounded-xl">
                <div class="flex items-center mb-2 space-x-2">
                    <span class="text-orange-700 font-black text-sm">集水井:</span>
                    <input type="text" id="name_b" value="B" class="!w-20 !bg-white">
                </div>
                <div class="space-y-2">
                    <input type="number" id="b_cover" step="0.001" placeholder="B 蓋面">
                    <input type="number" id="b_bottom" step="0.001" placeholder="B 溝底">
                    <input type="number" id="b_sump" step="0.001" placeholder="B 井底">
                </div>
            </div>
        </div>

        <button onclick="calculateV80()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-black transition-all active:scale-95 text-lg no-print">
            執行計算
        </button>

        <!-- 結果區 -->
        <div id="result_area" class="mt-8" style="display:none;">
            <div class="overflow-x-auto shadow-lg border rounded-xl mb-8">
                <table class="w-full text-center text-xs md:text-sm bg-white border-collapse">
                    <thead class="bg-slate-800 text-white font-bold text-[10px] md:text-xs">
                        <tr>
                            <th class="p-3 border-r border-slate-700">樁號 (Sta.)</th>
                            <th class="p-3 border-r border-slate-700">蓋面</th>
                            <th class="p-3 border-r border-slate-700 bg-slate-700">牆頂(-0.15)</th>
                            <th class="p-3 border-r border-slate-700 bg-emerald-800">溝底</th>
                            <th class="p-3 bg-amber-700">挖掘(-0.15)</th>
                        </tr>
                    </thead>
                    <tbody id="result_body" class="text-slate-700 font-medium border-b border-slate-200"></tbody>
                </table>
            </div>
            <div class="bg-white p-4 border rounded-2xl shadow-inner mb-6 overflow-x-auto">
                <div id="svg_container" class="min-w-[620px] flex justify-center py-4 bg-white"></div>
            </div>
            <button onclick="window.print()" class="w-full bg-slate-500 text-white py-4 rounded-xl font-black no-print shadow-lg transition">列印 或 存成 PDF</button>
        </div>
    </div>

    <script>
        // BM 雙軌連動邏輯
        function syncBM(type) {
            var mInput = document.getElementById('bm_m');
            var cmInput = document.getElementById('bm_cm');
            var refBase = parseFloat(document.getElementById('ref_base').value) || 17.00;

            if (type === 'm') {
                var mVal = parseFloat(mInput.value);
                if (!isNaN(mVal)) {
                    cmInput.value = ((mVal - refBase) * 100).toFixed(1);
                }
            } else if (type === 'cm') {
                var cmVal = parseFloat(cmInput.value);
                if (!isNaN(cmVal)) {
                    mInput.value = (refBase + (cmVal / 100)).toFixed(3);
                }
            }
            updateHI();
        }

        function updateHI() {
            var bm = parseFloat(document.getElementById('bm_m').value) || 0;
            var bs = parseFloat(document.getElementById('bs').value) || 0;
            document.getElementById('hi_display').innerText = (bm + bs).toFixed(3);
        }

        function calculateV80() {
            var bm = parseFloat(document.getElementById('bm_m').value) || 0;
            var bs = parseFloat(document.getElementById('bs').value) || 0;
            var hi = bm + bs;
            var startSt = parseFloat(document.getElementById('start_st').value) || 0;
            var L = parseFloat(document.getElementById('total_len').value) || 0;
            var step = parseFloat(document.getElementById('step_val').value) || 2.5;
            var refBase = parseFloat(document.getElementById('ref_base').value) || 17.00;

            var nameA = document.getElementById('name_a').value || "A";
            var nameB = document.getElementById('name_b').value || "B";

            if (L <= 0) { alert("請輸入總長度"); return; }
            
            var a_c = parseFloat(document.getElementById('a_cover').value) || 0;
            var a_b = parseFloat(document.getElementById('a_bottom').value) || 0;
            var a_s = parseFloat(document.getElementById('a_sump').value) || 0;
            var b_c = parseFloat(document.getElementById('b_cover').value) || 0;
            var b_b = parseFloat(document.getElementById('b_bottom').value) || 0;
            var b_s = parseFloat(document.getElementById('b_sump').value) || 0;

            var tbody = document.getElementById('result_body');
            tbody.innerHTML = "";

            function fmt(val) {
                var abs = val.toFixed(2);
                var rel = ((val - refBase) * 100).toFixed(1);
                var relText = (parseFloat(rel) >= 0 ? "+" + rel : rel);
                return abs + ' <span class="rel-value">(' + relText + ')</span>';
            }
            function getFS(val) {
                return '<br><span class="fs-value">' + (hi - val).toFixed(2) + '</span>';
            }

            var pts = [];
            for (var d = 0; d <= L; d += step) pts.push(d);
            if (pts[pts.length-1] !== L) pts.push(L);

            for (var i = 0; i < pts.length; i++) {
                var d = pts[i];
                var curSt = (startSt + d).toFixed(2);
                var cov = a_c + ((b_c - a_c) / L) * d;
                var bot = a_b + ((b_b - a_b) / L) * d;
                var wal = cov - 0.15;
                var dig = bot - 0.15;
                
                if (d === 0) appendWellRow(tbody, curSt, nameA, a_s, hi, refBase);
                
                var tr = document.createElement('tr');
                if (d === 0 || d === L) tr.style.fontWeight = "bold";
                var label = (d === 0) ? " (" + nameA + ")" : (d === L ? " (" + nameB + ")" : "");

                tr.innerHTML = '<td class="p-3 border-r font-mono bg-slate-50 text-slate-800 tracking-tighter">'+curSt+label+'</td>' +
                    '<td class="p-3 border-r">'+fmt(cov)+getFS(cov)+'</td>' +
                    '<td class="p-3 border-r">'+fmt(wal)+getFS(wal)+'</td>' +
                    '<td class="p-3 border-r">'+fmt(bot)+getFS(bot)+'</td>' +
                    '<td class="p-3 bg-amber-50/50 font-bold">'+fmt(dig)+getFS(dig)+'</td>';
                tbody.appendChild(tr);

                if (d === L) appendWellRow(tbody, curSt, nameB, b_s, hi, refBase);
            }

            drawProfileV80(startSt, startSt+L, a_c, a_b, a_s, b_c, b_b, b_s, nameA, nameB, refBase);
            document.getElementById('result_area').style.display = "block";
        }

        function appendWellRow(t, st, name, sumpElev, hi, ref) {
            var digElev = sumpElev - 0.15;
            var relSump = ((sumpElev - ref) * 100).toFixed(1);
            var relDig = ((digElev - ref) * 100).toFixed(1);
            var relSText = (parseFloat(relSump) >= 0 ? "+" + relSump : relSump);
            var relDText = (parseFloat(relDig) >= 0 ? "+" + relDig : relDig);

            var tr = document.createElement('tr');
            tr.className = "bg-indigo-100 font-bold text-indigo-800 border-y-2 border-indigo-200";
            tr.innerHTML = '<td class="p-2 border-r font-mono tracking-tighter text-[10px]">'+st+' (井底)</td>' +
                '<td class="p-2 border-r text-left pl-2" colspan="2">集水井 '+name+' 井底: '+sumpElev.toFixed(2)+' <span class="rel-value">('+relSText+')</span></td>' +
                '<td class="p-2 border-r">FS: <span class="fs-value">'+(hi-sumpElev).toFixed(2)+'</span></td>' +
                '<td class="p-2 bg-rose-50 text-rose-800 font-bold text-[10px]">挖掘: '+digElev.toFixed(2)+' <span class="rel-value">('+relDText+')</span><br>FS: <span class="fs-value">'+(hi-digElev).toFixed(2)+'</span></td>';
            t.appendChild(tr);
        }

        function drawProfileV80(stA, stB, ac, ab, as, bc, bb, bs, nA, nB, ref) {
            function f(v) { 
                var r = ((v - ref) * 100).toFixed(1);
                return v.toFixed(2) + "(" + (parseFloat(r)>=0?"+":"") + r + ")"; 
            }
            var aw = ac - 0.15; var bw = bc - 0.15;
            var dpxA = aw - ab; var dpxB = bw - bb;
            var svg = '<svg width="600" height="320" viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" style="background:#fff">' +
                '<line x1="80" y1="260" x2="520" y2="260" stroke="#cbd5e1" stroke-width="2" />' +
                '<text x="80" y="285" font-size="12" fill="#64748b" font-weight="bold">集水井 '+nA+' (Sta. '+stA.toFixed(2)+')</text>' +
                '<text x="400" y="285" font-size="12" fill="#64748b" font-weight="bold">集水井 '+nB+' (Sta. '+stB.toFixed(2)+')</text>' +
                '<rect x="80" y="50" width="50" height="200" fill="#f8fafc" stroke="#94a3b8" />' +
                '<line x1="80" y1="50" x2="130" y2="50" stroke="#1e293b" stroke-width="4" />' +
                '<text x="10" y="55" font-size="9" font-weight="bold">蓋:'+f(ac)+'</text>' +
                '<text x="10" y="75" font-size="9" fill="#4f46e5">牆:'+f(aw)+'</text>' +
                '<text x="10" y="220" font-size="9" fill="#059669">底:'+f(ab)+'</text>' +
                '<text x="10" y="250" font-size="9" fill="#2563eb" font-weight="bold">井底:'+f(as)+'</text>' +
                '<rect x="470" y="70" width="50" height="180" fill="#f8fafc" stroke="#94a3b8" />' +
                '<line x1="470" y1="70" x2="520" y2="70" stroke="#1e293b" stroke-width="4" />' +
                '<text x="525" y="75" font-size="9" font-weight="bold">蓋:'+f(bc)+'</text>' +
                '<text x="525" y="95" font-size="9" fill="#4f46e5">牆:'+f(bw)+'</text>' +
                '<text x="525" y="220" font-size="9" fill="#059669">底:'+f(bb)+'</text>' +
                '<text x="525" y="250" font-size="9" fill="#2563eb" font-weight="bold">井底:'+f(bs)+'</text>' +
                '<path d="M130 50 L470 70" stroke="#94a3b8" stroke-width="1" fill="none" />' + 
                '<path d="M130 65 L470 85" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4" fill="none" />' + 
                '<path d="M130 215 L470 215" stroke="#10b981" stroke-width="3" fill="none" />' + 
                '<line x1="140" y1="65" x2="140" y2="215" stroke="#f43f5e" stroke-width="1" />' +
                '<text x="145" y="140" font-size="14" font-weight="bold" fill="#f43f5e">深度: '+dpxA.toFixed(2)+'m</text>' +
                '<line x1="460" y1="85" x2="460" y2="215" stroke="#f43f5e" stroke-width="1" />' +
                '<text x="380" y="150" font-size="14" font-weight="bold" fill="#f43f5e">深度: '+dpxB.toFixed(2)+'m</text>' +
                '</svg>';
            document.getElementById('svg_container').innerHTML = svg;
        }
    </script>
</body>
</html>
